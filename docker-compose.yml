version: '3.8'

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: saysmile-postgres
    environment:
      POSTGRES_USER: saysmile_admin
      POSTGRES_PASSWORD: saysmile_password
      POSTGRES_DB: saysmile_db
    ports:
      - "5433:5432"
    volumes:
      - saysmile-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saysmile_admin -d saysmile_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: saysmile-redis
    ports:
      - "6380:6379"
    volumes:
      - saysmile-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ldap:
    image: osixia/openldap:latest
    container_name: saysmile-ldap
    environment:
      LDAP_ORGANISATION: "SAySmile Dental Studio"
      LDAP_DOMAIN: "saysmile.local"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - saysmile-ldapdata:/var/lib/ldap
      - saysmile-ldapconfig:/etc/ldap/slapd.d
    restart: unless-stopped

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: saysmile-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "ldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "6443:80"
    depends_on:
      - ldap
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: saysmile-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: safnas@saysmile.com
      PGADMIN_DEFAULT_PASSWORD: saysmile_admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: saysmile-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Application Services ────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saysmile-backend
    environment:
      # Point to sibling docker-compose services (standard port 5432/6379 inside network)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/saysmile_db
      SPRING_DATASOURCE_USERNAME: saysmile_admin
      SPRING_DATASOURCE_PASSWORD: saysmile_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_LDAP_URLS: ldap://ldap:389
      SPRING_LDAP_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
    container_name: saysmile-web-admin
    environment:
      # Nginx will proxy /api/* to this internal service name
      BACKEND_HOST: backend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  saysmile-pgdata:
  saysmile-redisdata:
  saysmile-ldapdata:
  saysmile-ldapconfig:
