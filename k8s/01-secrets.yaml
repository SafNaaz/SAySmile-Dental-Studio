apiVersion: v1
kind: Secret
metadata:
  name: saysmile-secrets
  namespace: saysmile
type: Opaque
# Values are base64 encoded. To encode: echo -n 'value' | base64
# saysmile_admin   → c2F5c21pbGVfYWRtaW4=
# saysmile_password → c2F5c21pbGVfcGFzc3dvcmQ=
# admin            → YWRtaW4=
stringData:
  POSTGRES_USER: saysmile_admin
  POSTGRES_PASSWORD: saysmile_password
  POSTGRES_DB: saysmile_db
  REDIS_PASSWORD: ""
  LDAP_ADMIN_PASSWORD: admin
---
# ConfigMap for non-sensitive connection config
apiVersion: v1
kind: ConfigMap
metadata:
  name: saysmile-config
  namespace: saysmile
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-svc:5432/saysmile_db"
  SPRING_DATASOURCE_USERNAME: "saysmile_admin"
  SPRING_DATA_REDIS_HOST: "redis-svc"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_LDAP_URLS: "ldap://ldap-svc:389"
  BACKEND_HOST: "backend-svc"
