apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-admin
  namespace: saysmile
  labels:
    app: web-admin
spec:
  replicas: 2  # Static files are stateless — scale freely
  selector:
    matchLabels:
      app: web-admin
  template:
    metadata:
      labels:
        app: web-admin
    spec:
      containers:
        - name: web-admin
          # Local image loaded via: minikube image load saysmile/web-admin:latest
          image: saysmile/web-admin:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              valueFrom:
                configMapKeyRef:
                  name: saysmile-config
                  key: BACKEND_HOST
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-admin-svc
  namespace: saysmile
spec:
  selector:
    app: web-admin
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
