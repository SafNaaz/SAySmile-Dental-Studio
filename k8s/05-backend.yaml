apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: saysmile
  labels:
    app: backend
spec:
  replicas: 2  # 2 replicas for HA — Spring Boot is stateless, session stored in Redis
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Local image loaded via: minikube image load saysmile/backend:v3
          image: saysmile/backend:v3
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: saysmile-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saysmile-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_LDAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saysmile-secrets
                  key: LDAP_ADMIN_PASSWORD
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: saysmile
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
