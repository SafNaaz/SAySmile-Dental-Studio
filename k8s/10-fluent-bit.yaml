# ═══════════════════════════════════════════════════════════════
# Fluent Bit — Log Shipper (DaemonSet)
# ═══════════════════════════════════════════════════════════════
# Runs on every k8s node, tails all pod container logs from
# /var/log/containers/, enriches them with pod/namespace/app
# labels, and ships them to Loki.
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, namespaces, nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon          Off
        Log_Level       info
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On

    # ── INPUT: Tail all pod logs from the node filesystem ──
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        # Exclude monitoring namespace to avoid log loops
        Exclude_Path      /var/log/containers/*monitoring*.log
        Parser            docker
        DB                /var/log/fluent-bit/flb_kube.db
        Mem_Buf_Limit     32MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── FILTER: Enrich with Kubernetes pod metadata ──
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_message
        Keep_Log            Off
        Annotations         Off
        Labels              On

    # ── FILTER: Add cluster label ──
    [FILTER]
        Name    record_modifier
        Match   kube.*
        Record  cluster saysmile-local

    # ── OUTPUT: Ship to Loki ──
    [OUTPUT]
        Name              loki
        Match             kube.*
        Host              loki-svc.monitoring.svc.cluster.local
        Port              3100
        Labels            job=fluent-bit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name'], app=$kubernetes['labels']['app'], cluster=saysmile-local
        Label_Keys        $level,$severity
        Line_Format       json
        Remove_Keys       kubernetes,stream
        Http_User         ""
        Http_Passwd       ""

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[^:]*): (?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: monitoring
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
      annotations:
        # Exclude self from its own log collection
        fluentbit.io/exclude: "true"
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        # Run on master nodes too for complete log coverage
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2.0
          ports:
            - containerPort: 2020
              name: http
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: db
              mountPath: /var/log/fluent-bit
            - name: dockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: db
          hostPath:
            path: /var/log/fluent-bit
            type: DirectoryOrCreate
        - name: dockercontainers
          hostPath:
            path: /var/lib/docker/containers
