spring.application.name=saysmile-backend

# ─── Database ─────────────────────────────────────────────────────────────────
# Defaults point to local docker-compose ports.
# In containers, override via environment variables:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://saysmile-postgres:5432/saysmile_db
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/saysmile_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:saysmile_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:saysmile_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA/Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Redis ────────────────────────────────────────────────────────────────────
# In containers, set SPRING_DATA_REDIS_HOST=saysmile-redis and SPRING_DATA_REDIS_PORT=6379
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6380}

# ─── LDAP ─────────────────────────────────────────────────────────────────────
# In containers, set SPRING_LDAP_URLS=ldap://saysmile-ldap:389
spring.ldap.urls=${SPRING_LDAP_URLS:ldap://localhost:389}
spring.ldap.base=dc=saysmile,dc=local
spring.ldap.username=cn=admin,dc=saysmile,dc=local
spring.ldap.password=${SPRING_LDAP_PASSWORD:admin}

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Actuator (for k8s health probes) ────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
# Enable Kubernetes liveness and readiness probe groups
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Tag all Prometheus metrics with app name for Grafana filtering
management.metrics.tags.application=saysmile-backend
management.metrics.tags.environment=${SPRING_PROFILES_ACTIVE:local}
