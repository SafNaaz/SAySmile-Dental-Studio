<div class="page-container">
  <div class="page-header">
    <h1>📦 Clinical Inventory</h1>
    <button class="primary-btn" (click)="toggleForm()">{{ showForm ? 'Close' : '+ Add Item' }}</button>
  </div>

  <div class="form-card" *ngIf="showForm">
    <h3>Add New Inventory Item</h3>
    <form (ngSubmit)="addItem()" #itemForm="ngForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Item Name</label>
          <input type="text" [(ngModel)]="newItem.name" name="name" required placeholder="e.g. Venus Composite">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select [(ngModel)]="newItem.category" name="category" required>
            <option value="Composites">Composites</option>
            <option value="Instruments">Instruments</option>
            <option value="PPE">PPE</option>
            <option value="Pharmaceuticals">Pharmaceuticals</option>
            <option value="Orthodontics">Orthodontics</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" [(ngModel)]="newItem.stockQuantity" name="stockQuantity" required min="0">
        </div>
        <div class="form-group">
          <label>Alert Threshold</label>
          <input type="number" [(ngModel)]="newItem.minimumThreshold" name="minimumThreshold" required min="1">
        </div>
        <div class="form-group">
          <label>Cost per Unit (₹)</label>
          <input type="number" [(ngModel)]="newItem.costPerUnit" name="costPerUnit" required min="0">
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="submit-btn" [disabled]="!itemForm.form.valid">Save Item</button>
      </div>
    </form>
  </div>

  <div class="table-card">
    <table class="data-table">
      <thead>
        <tr>
          <th>Item Code</th>
          <th>Name</th>
          <th>Category</th>
          <th>Stock Quantity</th>
          <th>Alert Threshold</th>
          <th>Cost / Unit</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of inventory">
          <td>#INV-{{ item.id }}</td>
          <td><strong>{{ item.name }}</strong></td>
          <td><span class="issue-badge">{{ item.category }}</span></td>
          <td>
            <span [ngStyle]="{'color': item.stockQuantity <= item.minimumThreshold ? '#ef4444' : '#10b981', 'font-weight': '600'}">
              {{ item.stockQuantity }} units
            </span>
          </td>
          <td>{{ item.minimumThreshold }} units</td>
          <td>₹{{ item.costPerUnit }}</td>
          <td>
            <button class="action-btn view">Order More</button>
            <button class="action-btn edit">Update</button>
            <button class="action-btn delete" (click)="deleteItem(item.id)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="inventory.length === 0">
          <td colspan="7" class="empty-state">Inventory is empty.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
