<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-container">
      <span class="logo-icon">🦷</span>
      <h2>SAySmile Dental Studio</h2>
    </div>

    <div class="role-selector">
      <button class="role-tab" [class.active]="loginData.userType === 'STAFF'" (click)="setRole('STAFF')">Staff Login</button>
      <button class="role-tab" [class.active]="loginData.userType === 'PATIENT'" (click)="setRole('PATIENT')">Patient Login</button>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group" *ngIf="isSignupMode">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" [(ngModel)]="loginData.fullName" [required]="isSignupMode" placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label for="username">Phone / Username</label>
        <input type="text" id="username" name="username" [(ngModel)]="loginData.username" required placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="loginData.password" required placeholder="Enter your password">
      </div>

      <div class="error-msg" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="!loginForm.form.valid">
        {{ isSignupMode ? 'Create Account' : 'Secure Login' }}
      </button>

      <div class="toggle-mode" *ngIf="loginData.userType === 'PATIENT'">
        <a href="javascript:void(0)" (click)="toggleMode()">
          {{ isSignupMode ? 'Already have an account? Login here' : 'New Patient? Sign up here' }}
        </a>
      </div>
    </form>
    
    <div class="footer-hint">
      Authorized personnel only. Data protected by 256-bit AES encryption.
    </div>
  </div>
</div>
