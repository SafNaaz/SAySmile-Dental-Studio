<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-container">
      <span class="logo-icon">🦷</span>
      <h2>SAySmile Dental Studio</h2>
    </div>

    <div class="role-selector">
      <button class="role-tab" [class.active]="loginData.userType === 'STAFF'" (click)="setRole('STAFF')">Staff Login</button>
      <button class="role-tab" [class.active]="loginData.userType === 'PATIENT'" (click)="setRole('PATIENT')">Patient Login</button>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="username">Username / Phone</label>
        <input type="text" id="username" name="username" [(ngModel)]="loginData.username" required placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="loginData.password" required placeholder="Enter your password">
      </div>

      <div class="error-msg" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="!loginForm.form.valid">Secure Login</button>
    </form>
    
    <div class="footer-hint">
      Authorized personnel only. Data protected by 256-bit AES encryption.
    </div>
  </div>
</div>
